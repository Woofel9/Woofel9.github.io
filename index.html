<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikipedia</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        header {
            background-color: #3366cc;
            color: white;
            padding: 15px 20px;
        }
        header h1 {
            margin: 0;
        }
        nav {
            background-color: #f8f8f8;
            padding: 10px 20px;
            border-bottom: 1px solid #ddd;
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #3366cc;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .search-box {
            margin: 20px 0;
            text-align: center;
        }
        .search-box input[type="text"] {
            padding: 10px;
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .search-box button {
            padding: 10px 20px;
            margin-left: 10px;
            background-color: #3366cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .search-box button:hover {
            background-color: #224d8c;
        }
        .featured {
            margin-top: 40px;
            text-align: center;
        }
        .featured h2 {
            color: #444;
        }
        .categories {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .categories a {
            text-decoration: none;
            color: #3366cc;
            margin: 10px;
        }
        footer {
            background-color: #f8f8f8;
            padding: 10px 20px;
            text-align: center;
            border-top: 1px solid #ddd;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Wikipedia</h1>
    </header>
    <nav>
        <a href="#">Main Page</a>
        <a href="#">Contents</a>
        <a href="#">Current Events</a>
        <a href="#">Random Article</a>
        <a href="#">About Wikipedia</a>
        <a href="#">Help</a>
    </nav>
    <main>
        <div class="search-box">
            <input type="text" placeholder="Search Wikipedia...">
            <button>Search</button>
        </div>
        <div class="featured">
            <h2>Featured Article</h2>
            <p>Discover the amazing world of free knowledge. Today's featured article is about <strong>Artificial Intelligence</strong>.</p>
        </div>
        <div class="categories">
            <a href="#">Arts</a>
            <a href="#">History</a>
            <a href="#">Science</a>
            <a href="#">Technology</a>
            <a href="#">Geography</a>
            <a href="#">Culture</a>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 Wikipedia. All rights reserved.</p>
    </footer>
</body>
</html>
